<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub版 記録くんテスト</title>
    <style>
        video { width: 100%; max-width: 400px; border: 2px solid #333; }
        button { padding: 10px 20px; font-size: 16px; margin: 10px; }
    </style>
</head>
<body>
    <h2>GitHub カメラ・マイク テスト</h2>
    <video id="video" autoplay playsinline muted></video>
    <br>
    <button id="startBtn">カメラ・マイクを起動</button>

    <script>
        const video = document.getElementById('video');
        const startBtn = document.getElementById('startBtn');

        startBtn.addEventListener('click', async () => {
            try {
                // ブラウザにカメラとマイクの許可を求める命令
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                video.srcObject = stream;
                alert('成功！マイクとカメラが繋がりました。');
            } catch (err) {
                console.error("エラー:", err);
                alert('アクセスが拒否されました。設定を確認してください。');
            }
        });
    </script>
</body>
</html>
